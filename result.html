<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぷよクエ共通テスト 結果</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div style="text-align:right; margin-bottom:15px;">
        <button onclick="location.href='post.html'">
            問題投稿はこちら
        </button>
    </div>

    <h1>第2回ぷよクエ共通テスト 結果</h1>

    <div class="info">
        <h2 id="scoreText"></h2>
        <p id="rateText"></p>
        <p id="sendStatus"></p>
    </div>

    <div class="info">
        <h2>間違えた問題</h2>
        <div id="wrongArea"></div>
    </div>

    <div style="margin-top:30px; display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="shareX()">Xで結果を共有</button>
        <button onclick="resetTest()">もう一度受験する</button>
        <button onclick="location.href='index.html'">問題画面に戻る</button>
        <button onclick="location.href='post.html'">問題を投稿する</button>
    </div>

</div>

<script>

const RESULT_GAS_URL =
"https://script.google.com/macros/s/AKfycbw-cAc5g9mEM7wKBMi64Fm5eW7aajhe3XEXF5rDU6mEVMsnoZHJK9DoGcPMv9dyMfoR/exec";

const sections = JSON.parse(localStorage.getItem("puyoSections"));

if(!sections){
    alert("結果データが見つかりません。最初から受験してください。");
    location.href = "index.html";
}

let score = 0;
let total = 0;
let wrongHtml = "";

const sessionId =
    localStorage.getItem("testSessionId") || "no_session";

const resultData = {
    sessionId: sessionId,
    nickname: localStorage.getItem("nickname") || "",
    rank: localStorage.getItem("rank") || "",
    score: 0,
    total: 0,
    rate: 0
};

sections.forEach((section, sectionIndex) => {

    section.questions.forEach((q, questionIndex) => {

        total++;

        const userAnswer = localStorage.getItem(q.id);

        if(userAnswer === q.answer){

            score++;
            resultData[q.id] = "○";

        }else if(userAnswer === null){

            resultData[q.id] = "未回答";

            wrongHtml += `
            <div class="info">
                <strong>第${sectionIndex + 1}問　問${questionIndex + 1}</strong>
                <p>${q.text}</p>
                <p>あなたの回答：未回答</p>
                <p>正解：${q.answer}</p>
            </div>
            `;

        }else{

            resultData[q.id] = "×";

            wrongHtml += `
            <div class="info">
                <strong>第${sectionIndex + 1}問　問${questionIndex + 1}</strong>
                <p>${q.text}</p>
                <p>あなたの回答：${userAnswer}</p>
                <p>正解：${q.answer}</p>
            </div>
            `;

        }

    });

});

const rate = total === 0 ? 0 : (score / total * 100).toFixed(1);

resultData.score = score;
resultData.total = total;
resultData.rate = rate;

document.getElementById("scoreText").innerText =
    `${score} / ${total} 問正解`;

document.getElementById("rateText").innerText =
    `正答率：${rate}%`;

document.getElementById("wrongArea").innerHTML =
    wrongHtml === ""
    ? "<p>全問正解！すごい！</p>"
    : wrongHtml;

sendResult();

async function sendResult(){

    const alreadySentKey =
        "result_sent_" + sessionId;

    if(localStorage.getItem(alreadySentKey) === "true"){
        document.getElementById("sendStatus").innerText =
            "この結果は送信済みです。";
        return;
    }

    document.getElementById("sendStatus").innerText =
        "結果を送信中...";

    try{

        await fetch(RESULT_GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(resultData)
        });

        localStorage.setItem(alreadySentKey, "true");

        document.getElementById("sendStatus").innerText =
            "結果を送信しました。";

    }catch(error){

        console.error(error);

        document.getElementById("sendStatus").innerText =
            "結果の送信に失敗しました。";

    }

}

function resetTest(){

    Object.keys(localStorage).forEach(key => {
        if(
            key.startsWith("q") ||
            key.startsWith("shuffle_q") ||
            key.startsWith("result_sent_")
        ){
            localStorage.removeItem(key);
        }
    });

    localStorage.removeItem("puyoSections");

    location.href = "index.html";
}

function shareX(){

    const nickname =
        localStorage.getItem("nickname") || "";

    const text =
`第２回ぷよクエ共通テストを受験しました！

${nickname ? `受験者：${nickname}\n` : ""}結果：${score} / ${total} 問正解
正答率：${rate}%

第一回は↓のリンクから挑戦できます！
https://k-sandao.github.io/pyqetest/

#ぷよクエ共通テスト`;

    const url =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text);

    window.open(url, "_blank");

}

</script>

</body>
</html>
