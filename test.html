let currentSection = 0;

function saveAnswer(questionId, answer){
    localStorage.setItem(questionId, answer);
}

function shuffleArray(array){
    const copied = [...array];

    for(let i = copied.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
    }

    return copied;
}

function getShuffledChoices(q){
    const key = "shuffle_" + q.id;
    const saved = localStorage.getItem(key);

    if(saved){
        try{
            const parsed = JSON.parse(saved);

            const isValid =
                parsed.length === q.choices.length &&
                parsed.every(choice => q.choices.includes(choice));

            if(isValid){
                return parsed;
            }
        }catch(e){
            localStorage.removeItem(key);
        }
    }

    const shuffled = shuffleArray(q.choices);
    localStorage.setItem(key, JSON.stringify(shuffled));

    return shuffled;
}

function renderSection(){

    const section = sections[currentSection];

    document.getElementById("progressText").innerText =
        `進捗：第${currentSection + 1}問 / 第${sections.length}問`;

    document.getElementById("progressFill").style.width =
        `${((currentSection + 1) / sections.length) * 100}%`;

    document.getElementById("sectionTitle").innerText =
        section.title;

    let html = "";

    section.questions.forEach((q,index)=>{

        html += `
        <div class="info">
            <strong>問${index + 1}</strong>
            <p>${q.text}</p>
        `;

        const shuffledChoices = getShuffledChoices(q);

        shuffledChoices.forEach((choice,choiceIndex)=>{

            const checked =
                localStorage.getItem(q.id) === choice
                ? "checked"
                : "";

            html += `
            <label class="choiceLabel">
                <input
                    type="radio"
                    name="${q.id}"
                    value="${choice}"
                    ${checked}
                >
                ${["①","②","③","④","⑤"][choiceIndex]}
                ${choice}
            </label>
            `;

        });

        html += `</div>`;

    });

    document.getElementById("questionArea").innerHTML = html;

    document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener("change", function(){
            saveAnswer(this.name, this.value);
        });
    });

    document.getElementById("prevBtn").style.display =
        currentSection === 0 ? "none" : "block";

    document.getElementById("nextBtn").innerText =
        currentSection === sections.length - 1
        ? "結果へ"
        : "次へ";
}

function nextSection(){

    if(currentSection < sections.length - 1){

        currentSection++;
        renderSection();

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });

    }else{

        const unanswered = [];

        sections.forEach(section => {

            section.questions.forEach(q => {

                if(localStorage.getItem(q.id) === null){
                    unanswered.push(q.id);
                }

            });

        });

        if(unanswered.length > 0){

            const go = confirm(
                `未回答の問題が ${unanswered.length} 問あります。\n\n提出しますか？`
            );

            if(!go){
                return;
            }

        }

        localStorage.setItem("puyoSections", JSON.stringify(sections));

        window.location.href = "result.html";

    }
}

function prevSection(){

    if(currentSection > 0){

        currentSection--;
        renderSection();

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });

    }
}
